<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김산 &  안셀라</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">

    <style>
        /* --- Base Styles & Variables --- */
        :root {
            --primary-color: #4a4a4a;
            --bg-color: #faf9f7;
            --accent-color: #d4af37;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            line-height: 1.6;
            overflow-x: hidden; /* Prevent horizontal scrollbar on the whole page */
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* --- Hero Section --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(250, 249, 247, 0.7), rgba(250, 249, 247, 0.9)), 
                        url('https://images.unsplash.com/photo-1519741497674-611481863552?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80') center/cover;
            padding: 20px;
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            margin-bottom: 10px;
            color: #2c2c2c;
        }

        .hero p {
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .hero-date {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--accent-color);
            font-style: italic;
        }

        /* --- Details Section --- */
        .details {
            padding: 80px 0;
            text-align: center;
        }

        .details h2 {
            font-size: 2.5rem;
            margin-bottom: 40px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            margin-top: 30px;
        }

        .detail-card {
            background: #fff;
            padding: 40px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        /* --- Infinite Scroll Gallery Section --- */
        .gallery-section {
            padding: 80px 0;
            background-color: #fff;
            overflow: hidden; /* Contains the scrolling elements */
        }

        .gallery-section h2 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 40px;
        }

        /* The container that scrolls */
        .gallery-track {
            display: flex;
            width: max-content; /* Let the track be as wide as all images combined */
            animation: scrollX 40s linear infinite; /* Adjust '40s' for speed */
        }

        /* Pause the animation when hovering so users can click */
        .gallery-track:hover {
            animation-play-state: paused;
        }

        .gallery-track img {
            height: 300px; /* Fixed height for consistency */
            width: auto;   /* Width adjusts to maintain aspect ratio */
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.3s ease;
            padding-right: 15px; /* Acts as the gap between images */
        }

        .gallery-track img:hover {
            transform: scale(1.02);
        }

        /* The Keyframes for the endless scroll */
        @keyframes scrollX {
            0% {
                transform: translateX(0);
            }
            100% {
                /* Shifts exactly half the width of the track to perfectly loop */
                transform: translateX(-50%);
            }
        }

        /* --- Lightbox (Popup for Images) --- */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            padding-right: 0; /* Resetting padding from the gallery track */
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            font-family: sans-serif;
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 40px;
            background: var(--bg-color);
            font-family: 'Playfair Display', serif;
            font-style: italic;
        }
    </style>
</head>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">

    </div>

    <footer>
        <p>We can't wait to celebrate with you.</p>
    </footer>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        function openLightbox(imageSrc) {
            lightboxImg.src = imageSrc;
            lightbox.style.display = 'flex';
        }

        function closeLightbox() {
            lightbox.style.display = 'none';
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                closeLightbox();
            }
        });
    </script>
